# curp task configuration
name: "curp"
description: "CURP consensus protocol with reduced latency and improved availability"
system_type: "distributed"
language: "rust"

# Source code repository information
repository:
  url: "https://github.com/xline-kv/Xline.git"
  branch: "master"
  commit: "71479a4fabdd12fe67eec0bee95e652976937541"
  have_submodule: true

# Files to extract from the repository (multi-file default)
default_source_file:
  - path: "crates/curp/src/server/raw_curp/mod.rs"
    description: "Core server logic of CURP and Raft"
  - path: "crates/curp/src/server/curp_node.rs"
    description: "Core server logic of CURP"
  - path: "crates/curp/src/client/unary/propose_impl.rs"
    description: "Core client logic of CURP"
  - path: "crates/curp/src/lib.rs"
    description: "Quorum value definitions of CURP"

# TLA+ specification module name
specModule: "curp"

traces_folder: "data/sys_traces/curp"

# Metadata
metadata:
  original_project: "curp"
  protocol_type: "consensus"
  key_features:
    - "reduced_latency"
    - "improved_availability" 
    - "speculative_execution"
    - "quorum_optimization"
  
# TV (transition validation) configuration
# Only infrastructure + evaluation scope go here. Schema variables,
# auxiliary variables, and value conventions are derived by the agent
# from reading the spec — not prescribed in this file.
tv:
  repo_path: "data/repositories/Xline"

  # Semantic scope of evaluation. Agent maps these to the spec's own names.
  # Raw trace events already match spec action names exactly — no translation.
  target_actions:
    - Propose
    - ProcessProposeLeader
    - ProcessProposeNonLeader
    - Commit
    - ProcessCommitMsg
    - LeaderChange

  harness:
    type: "native"
    instrumentation_file: "data/patches/xline-instrumented.patch"
    test_file: "crates/simulation/src/bin/trace_generator.rs"
    test_target: "trace_generator"
    run_command: "bash scripts/harness/curp/run.sh"
    traces_output_env: "TRACES_DIR"
    traces_default_dir: "artifacts/curp/traces"
    instrumentation_doc: "tla_eval/tasks/curp/INSTRUMENTATION.md"
    # Event names are already canonical; no mapping.
    trace_action_map:
      Propose: "Propose"
      ProcessProposeLeader: "ProcessProposeLeader"
      ProcessProposeNonLeader: "ProcessProposeNonLeader"
      Commit: "Commit"
      ProcessCommitMsg: "ProcessCommitMsg"
      LeaderChange: "LeaderChange"
    coverage_gaps:
      - "3 nodes / 30 operations / 10% packet loss by default (CURP_NODES, CURP_OP_COUNT env overrides)"
      - "Only r2 becomes leader once in default seed; for more LeaderChange windows, rerun or lengthen the scenario"
      - "trace events carry state deltas (json-patch-like format), not full snapshots; TV agent reconstructs state by replaying deltas"
