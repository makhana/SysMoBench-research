# Lock service task configuration
name: "locksvc"
description: "PGo-generated lock synchronization service"
system_type: "distributed"
language: "go"

# Source code repository information
repository:
  url: "https://github.com/DistCompiler/pgo.git"
  branch: "main"
  
# Files to extract from the repository
source_files:
  - path: "systems/locksvc/locksvc.go"
    description: "Lock implementation"

# Default file to use if not specified
default_source_file: "systems/locksvc/locksvc.go"

# TLA+ specification module name
specModule: "locksvc"

# Traces folder location
traces_folder: "data/sys_traces/locksvc"

# Metadata
metadata:
  original_project: "DistCompiler/pgo"
  
# TV (transition validation) configuration
# Only infrastructure + evaluation scope go here. Schema variables,
# auxiliary variables, and value conventions are derived by the agent
# from reading the spec — not prescribed in this file.
tv:
  repo_path: "data/repositories/pgo"

  # Semantic scope of evaluation. Agent maps these to the spec's own names.
  target_actions:
    - ClientLockRequest
    - ServerGrantLock
    - ClientCriticalSection
    - ClientUnlockRequest

  harness:
    type: "native"
    instrumentation_file: "scripts/harness/locksvc/locksvc_trace_test.go"
    test_file: "data/repositories/pgo/systems/locksvc/locksvc_test.go"
    test_target: "Test3ClientsWithTrace"
    run_command: "bash scripts/harness/locksvc/run.sh"
    traces_output_env: "TRACES_DIR"
    traces_default_dir: "artifacts/locksvc/traces"
    instrumentation_doc: "tla_eval/tasks/locksvc/INSTRUMENTATION.md"
    trace_action_map:
      "AClient.acquireLock": "ClientLockRequest"
      "AClient.criticalSection": "ClientCriticalSection"
      "AClient.unlock": "ClientUnlockRequest"
      "AServer.serverRespond (with GrantMsg write)": "ServerGrantLock"
    coverage_gaps:
      - "Test3ClientsWithTrace uses 3 clients + 1 server — ~3 ClientLockRequest, 3 ServerGrantLock, 2-3 ClientCriticalSection, 2-3 ClientUnlockRequest windows (goroutine-scheduling variance)"
      - "serverRespond fires BOTH for grant-on-LockMsg and grant-after-Unlock; parser disambiguates via the network write's value (GrantMsg=3)"
      - "serverRespond events WITHOUT a GrantMsg write (Lock queued behind existing holder) emitted with action=null"
