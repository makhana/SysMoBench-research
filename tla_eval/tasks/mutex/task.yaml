# mutex task configuration
name: "mutex"
description: "Asterinas OS mutex synchronization primitive"
system_type: "concurrent"
language: "rust"

# Source code repository information
repository:
  url: "https://github.com/asterinas/asterinas.git"
  branch: "main"
  
# Files to extract from the repository
source_files:
  - path: "ostd/src/sync/mutex.rs"
    description: "Mutex implementation for exclusive access"

# Default file to use if not specified
default_source_file: "ostd/src/sync/mutex.rs"

# TLA+ specification module name
specModule: "mutex"

# Traces folder location
traces_folder: "data/sys_traces/mutex"

# Metadata
metadata:
  original_project: "asterinas"
  
# TV (transition validation) configuration
# Only infrastructure + evaluation scope go here. Schema variables,
# auxiliary variables, and value conventions are derived by the agent
# from reading the spec — not prescribed in this file.
tv:
  # Shared Asterinas kernel clone (also used by spin, ringbuffer, rwmutex).
  repo_path: "artifacts/spin"

  # Semantic scope of evaluation. Agent maps these to the spec's own names.
  # Raw trace emits Lock/TryLock/Unlock; TV windowing translates to these.
  target_actions:
    - AcquireLock
    - TryAcquireLock
    - ReleaseLock

  harness:
    type: "docker"
    docker_image: "asterinas/asterinas:0.16.0-20250822"
    instrumentation_file: "ostd/src/sync/mutex_trace.rs"
    test_file: "ostd/src/sync/mutex_trace.rs"
    test_target: "test_mutex_trace"
    run_command: "bash scripts/harness/mutex/run.sh"
    traces_output_env: "TRACES_DIR"
    traces_default_dir: "artifacts/mutex/traces"
    instrumentation_doc: "tla_eval/tasks/mutex/INSTRUMENTATION.md"
    trace_action_map:
      Lock: "AcquireLock"
      TryLock: "TryAcquireLock"
      Unlock: "ReleaseLock"
