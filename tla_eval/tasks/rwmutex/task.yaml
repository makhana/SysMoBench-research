# rwmutex task configuration
name: "rwmutex"
description: "Asterinas OS read-write mutex synchronization primitive"
system_type: "concurrent"
language: "rust"

# Source code repository information
repository:
  url: "https://github.com/asterinas/asterinas.git"
  branch: "main"
  
# Files to extract from the repository
source_files:
  - path: "ostd/src/sync/rwmutex.rs"
    description: "Read-write mutex allowing multiple readers or single writer"

# Default file to use if not specified
default_source_file: "ostd/src/sync/rwmutex.rs"

# TLA+ specification module name
specModule: "rwmutex"

# Traces folder location
traces_folder: "data/sys_traces/rwmutex"

# Metadata
metadata:
  original_project: "asterinas"
  
# TV (transition validation) configuration
# Only infrastructure + evaluation scope go here. Schema variables,
# auxiliary variables, and value conventions are derived by the agent
# from reading the spec — not prescribed in this file.
tv:
  # Shared Asterinas kernel clone (also used by mutex, spin, ringbuffer).
  repo_path: "artifacts/spin"

  # Semantic scope of evaluation. Agent maps these to the spec's own names.
  # Raw trace emits ReadLock/WriteLock/UpreadLock/Try*/*Unlock/UpgradeLock;
  # TV windowing translates to these spec actions.
  target_actions:
    - AcquireReadLock
    - AcquireWriteLock
    - AcquireUpReadLock
    - ReleaseLock

  harness:
    type: "docker"
    docker_image: "asterinas/asterinas:0.16.0-20250822"
    instrumentation_file: "ostd/src/sync/rwmutex_trace.rs"
    test_file: "ostd/src/sync/rwmutex_trace.rs"
    test_target: "test_rwmutex_trace"
    run_command: "bash scripts/harness/rwmutex/run.sh"
    traces_output_env: "TRACES_DIR"
    traces_default_dir: "artifacts/rwmutex/traces"
    instrumentation_doc: "tla_eval/tasks/rwmutex/INSTRUMENTATION.md"
    trace_action_map:
      ReadLock: "AcquireReadLock"
      TryReadLock: "AcquireReadLock"
      WriteLock: "AcquireWriteLock"
      TryWriteLock: "AcquireWriteLock"
      UpreadLock: "AcquireUpReadLock"
      TryUpreadLock: "AcquireUpReadLock"
      ReadUnlock: "ReleaseLock"
      WriteUnlock: "ReleaseLock"
      UpreadUnlock: "ReleaseLock"
    coverage_gaps:
      - "test_rwmutex_trace does not exercise upread/upgrade paths; AcquireUpReadLock windows will be 0"
      - "Failed Try*Lock attempts are not traced; only successful paths scored"
